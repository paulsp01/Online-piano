<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css"
    rel="stylesheet"
/>
  <title>Piano</title>
</head>
<body>
  <div id="outer">
    <h1>Click or Press  Key and see the magic</h1>
    <div class="div1">
      <div class="box1" id="b1"></div>
      <div class="box2" id="b3"></div>
      <div class="box1" id="b2"><button><i class="ri-reset-right-line"></i></button></div>
    </div>

    <div class="div2">

      <div class="key-group">
        <div class="white" id="wfirst" ><h5>1</h5></div>
        <div class="black" id="bfirst"><h5>!</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wsec"><h5>2</h5></div>
        <div class="black" id="bsec"><h5>@</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthird"><h5>3</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wfourth"><h5>4</h5></div>
        <div class="black" id="bthird"><h5>$</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wfifth"><h5>5</h5></div>
        <div class="black" id="bfourth"><h5>%</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wsixth"><h5>6</h5></div>
        <div class="black" id="bfifth"><h5>^</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wseventh"><h5>7</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="weighth"><h5>8</h5></div>
        <div class="black" id="bsixth"><h5>*</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wninth"><h5>9</h5></div>
        <div class="black" id="bseventh"><h5>(</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtenth"><h5>0</h5></div>
      </div>

      <!-- Q-P row -->
      <div class="key-group">
        <div class="white" id="weleventh"><h5>q</h5></div>
        <div class="black" id="beighth"><h5>Q</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwelfth"><h5>w</h5></div>
        <div class="black" id="bninth"><h5>W</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirteenth"><h5>e</h5></div>
        <div class="black" id="btenth"><h5>E</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wfourteenth"><h5>r</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wfifteenth"><h5>t</h5></div>
        <div class="black" id="beleventh"><h5>T</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wsixteenth"><h5>y</h5></div>
        <div class="black" id="btwelfth"><h5>Y</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wseventeenth"><h5>u</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="weighteenth"><h5>i</h5></div>
        <div class="black" id="bthirteenth"><h5>I</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wninteenth"><h5>o</h5></div>
        <div class="black" id="bfourteenth"><h5>O</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentieth"><h5>p</h5></div>
        <div class="black" id="bfifteenth"><h5>P</h5></div>
      </div>

      <!-- a-m row -->
      <div class="key-group">
        <div class="white" id="wtwentyfirst"><h5>a</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentysecond"><h5>s</h5></div>
        <div class="black" id="bsixteenth"><h5>S</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentythird"><h5>d</h5></div>
        <div class="black" id="bseventeenth"><h5>D</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentyfourth"><h5>f</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentyfifth"><h5>g</h5></div>
        <div class="black" id="beighteenth"><h5>G</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentysixth"><h5>h</h5></div>
        <div class="black" id="bninteenth"><h5>H</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentyseventh"><h5>j</h5></div>
        <div class="black" id="btwentieth"><h5>J</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentyeighth"><h5>k</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wtwentyninth"><h5>l</h5></div>
        <div class="black" id="btwentyfirst"><h5>L</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirtieth"><h5>z</h5></div>
        <div class="black" id="btwentysecond"><h5>Z</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirtyfirst"><h5>x</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirtysecond"><h5>c</h5></div>
        <div class="black" id="btwentythird"><h5>C</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirtythird"><h5>v</h5></div>
        <div class="black" id="btwentyfourth"><h5>V</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirtyfourth"><h5>b</h5></div>
        <div class="black" id="btwentyfifth"><h5>B</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirtyfifth"><h5>n</h5></div>
      </div>

      <div class="key-group">
        <div class="white" id="wthirtysixth"><h5>m</h5></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
